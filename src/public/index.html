<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MinePanel — Server Management</title>
  <meta name="description" content="Minecraft server management panel." />
  <script>
    (function(){
      var t=localStorage.getItem('mp_theme');
      if(t==='light'||t==='dark')document.documentElement.setAttribute('data-theme',t);
      try {
        var a=localStorage.getItem('mp_accent');
        if(a){
          var r=document.documentElement;
          // Support both hsl(H,S%,L%) and hsl(H S% L%)
          var mh=a.match(/hsl\((\d+)[,\s]+([\d.]+)%[,\s]+([\d.]+)%/);
          if(mh){
            var h=+mh[1],s=+mh[2],l=+mh[3];
            var lh=Math.min(100,l+8);
            r.style.setProperty('--accent','hsl('+h+','+s+'%,'+l+'%)');
            r.style.setProperty('--accent-hover','hsl('+h+','+s+'%,'+lh+'%)');
            r.style.setProperty('--accent-glow','hsla('+h+','+s+'%,'+l+'%,0.15)');
            r.style.setProperty('--accent-subtle','hsla('+h+','+s+'%,'+l+'%,0.08)');
            r.style.setProperty('--green','hsl('+h+','+s+'%,'+l+'%)');
          }
        }
      } catch(e){}
    })();
  </script>

</head>
